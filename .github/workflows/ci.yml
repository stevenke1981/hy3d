name: ci

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install numpy==1.24.4

      - name: Configure
        run: cmake -S . -B build

      - name: Build and test Debug
        run: |
          cmake --build build --config Debug --parallel
          ctest --test-dir build -C Debug -LE slow --output-on-failure

      - name: Build and test Release
        run: |
          cmake --build build --config Release --parallel
          ctest --test-dir build -C Release -LE slow --output-on-failure

      - name: Verify clean release build
        run: ctest --test-dir build -C Release -R "^make_release$" --output-on-failure

  linux-sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: python -m pip install numpy==1.24.4

      - name: Configure with sanitizers
        run: cmake -S . -B build -DHY3D_ENABLE_SANITIZERS=ON

      - name: Build and test
        run: |
          cmake --build build --parallel
          ctest --test-dir build -LE slow --output-on-failure

  linux-clang-tidy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure clang-tidy
        run: cmake -S . -B build -DHY3D_ENABLE_CLANG_TIDY=ON -DHY3D_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build --parallel
